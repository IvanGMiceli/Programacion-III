<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link href="../CSS/form_registro_style.css" rel="stylesheet"/>
</head>
<body>
    <header>
        <h1>Formulario de Registro</h1>
    </header>
    <form id="registro">

        <div class="campo">
            <label>Nombre:</label>
            <input type="text" name="nombre" placeholder="Esteban" required/>
        </div>

        <div class="campo">
            <label>Apellido:</label>
            <input type="text" name="apellido" placeholder="Quito" required/>
        </div>

        <div class="campo">
            <label>Genero:</label>
            <select name="genero" required>
            <option selected></option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
        </select>
            
        </div>

        <div class="campo">
            <label>Fecha de Nacimiento.</label> 
            <input type="date" name="fecha_nac" required/>
        </div>

        <div class="campo">
            <label>Correo electronico:</label>
            <input type="email" name="correo_elec" placeholder="ejemplo@gmail.com" required/>
        </div>

        <div class="campo">
            <label>Password:</label>
            <input type="password" name="contraseña" placeholder="Insegura123" required/>
        </div>

        <div class="campo">
            <label class="tyc">Acepto los terminos y condiciones al enviar el siguiente formuliario</label>
            <input type="checkbox" required/>
        </div>

        <div class="boton_env">
            <button type="submit">Enviar</button>
            <button type="reset">Restablecer campos</button>
        </div>
    </form>
    
    <br>
    <a href="../index.html">Volver a pagina principal</a>
    
</body>
</html>
